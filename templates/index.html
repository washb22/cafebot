<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CafeBot - 네이버 카페 자동화</title>
<style>
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #222; --border: #2e2e2e;
    --accent: #7c6fff; --accent2: #ff6b9d; --text: #f0f0f0; --muted: #888;
    --success: #4ade80; --danger: #f87171; --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard','Apple SD Gothic Neo',sans-serif; min-height: 100vh; }

  nav { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px;
    background:rgba(13,13,13,.95); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .nav-logo { font-size:17px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .nav-status { display:flex; gap:12px; align-items:center; font-size:12px; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.on { background:var(--success); }
  .status-dot.off { background:var(--danger); }

  .layout { display:grid; grid-template-columns:1fr 380px; height:calc(100vh - 52px); }

  /* ── Left: Task Setup ── */
  .task-panel { overflow-y:auto; padding:20px; }
  .section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
  .section-title { font-size:13px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }

  .form-row { display:flex; gap:10px; margin-bottom:10px; align-items:center; }
  .form-label { font-size:12px; font-weight:600; min-width:60px; color:var(--muted); }
  .form-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:8px 12px; color:var(--text); font-size:13px; outline:none; font-family:inherit; }
  .form-input:focus { border-color:var(--accent); }
  .form-textarea { min-height:100px; resize:vertical; line-height:1.6; }

  .btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all .2s; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .btn-primary:hover { opacity:.85; }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn-outline { background:none; border:1px solid var(--border); color:var(--muted); }
  .btn-outline:hover { border-color:var(--accent); color:var(--text); }
  .btn-danger { background:rgba(248,113,113,.15); border:1px solid rgba(248,113,113,.3); color:var(--danger); }
  .btn-danger:hover { background:rgba(248,113,113,.25); }
  .btn-sm { padding:5px 10px; font-size:11px; }

  .mode-toggle { display:flex; gap:4px; background:var(--surface2); border-radius:8px; padding:3px; margin-bottom:12px; }
  .mode-btn { flex:1; padding:8px; border:none; background:none; color:var(--muted); border-radius:6px;
    font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .mode-btn.active { background:var(--surface); color:var(--text); }

  .account-tag { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--surface2);
    border:1px solid var(--border); border-radius:20px; font-size:12px; margin:2px; }
  .account-tag .role { color:var(--accent); font-weight:700; font-size:10px; }
  .account-tag .del { cursor:pointer; color:var(--danger); font-size:14px; }

  /* Comment rows */
  .comment-row { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px; }
  .comment-row select { background:var(--surface); border:1px solid var(--border); color:var(--text);
    border-radius:6px; padding:5px 8px; font-size:12px; outline:none; margin-bottom:6px; }
  .comment-row textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:8px; color:var(--text); font-size:12px; resize:none; height:50px; outline:none; font-family:inherit; }
  .comment-row textarea:focus { border-color:var(--accent); }

  .reply-row { background:rgba(124,111,255,.08); border:1px solid rgba(124,111,255,.2); border-radius:8px; padding:10px; margin-bottom:8px; }
  .reply-row textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:8px; color:var(--text); font-size:12px; resize:none; height:50px; outline:none; font-family:inherit; }

  .add-btn { width:100%; padding:8px; border:1px dashed var(--border); background:none; color:var(--muted);
    border-radius:8px; cursor:pointer; font-size:12px; transition:all .2s; }
  .add-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── Right: Log Panel ── */
  .log-panel { border-left:1px solid var(--border); display:flex; flex-direction:column; }
  .log-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .log-header-title { font-size:14px; font-weight:700; }
  .log-body { flex:1; overflow-y:auto; padding:12px; font-family:'Consolas','Courier New',monospace; font-size:12px; line-height:1.8; }
  .log-line { padding:2px 0; border-bottom:1px solid rgba(255,255,255,.03); }
  .log-time { color:var(--muted); margin-right:8px; }
  .log-msg { color:var(--text); }
  .log-line.error .log-msg { color:var(--danger); }
  .log-line.success .log-msg { color:var(--success); }

  .run-bar { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }
  .run-bar .btn { flex:1; padding:12px; font-size:14px; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CafeBot</div>
  <div class="nav-status">
    <span>ADB: <span class="status-dot" id="adbDot"></span> <span id="adbText">확인 중</span></span>
    <span>IP: <span id="currentIp">-</span></span>
  </div>
</nav>

<div class="layout">
  <!-- Left: Task Setup -->
  <div class="task-panel">

    <!-- Accounts -->
    <div class="section">
      <div class="section-title">계정 관리</div>
      <div id="accountsList" style="margin-bottom:10px"></div>
      <div style="display:flex;gap:6px">
        <input id="accId" class="form-input" placeholder="네이버 ID" style="flex:1">
        <input id="accPw" class="form-input" type="password" placeholder="비밀번호" style="flex:1">
        <select id="accRole" class="form-input" style="flex:0 0 80px">
          <option value="main">메인</option>
          <option value="commenter">댓글</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="addAccount()">추가</button>
      </div>
    </div>

    <!-- Task Mode -->
    <div class="section">
      <div class="section-title">글 설정</div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('new')">새 글 작성</button>
        <button class="mode-btn" onclick="setMode('edit')">기존 글 수정</button>
      </div>

      <div id="editUrlRow" style="display:none" class="form-row">
        <div class="form-label">수정 URL</div>
        <input id="postUrl" class="form-input" placeholder="수정할 글 URL">
      </div>

      <div class="form-row">
        <div class="form-label">카페 URL</div>
        <input id="cafeUrl" class="form-input" placeholder="카페 영문주소 (예: mycafe123)">
      </div>
      <div class="form-row">
        <div class="form-label">게시판</div>
        <input id="boardName" class="form-input" placeholder="게시판 이름 (선택사항)">
      </div>
      <div class="form-row" style="align-items:flex-start">
        <div class="form-label" style="margin-top:8px">제목</div>
        <input id="postTitle" class="form-input" placeholder="글 제목">
      </div>
      <div class="form-row" style="align-items:flex-start">
        <div class="form-label" style="margin-top:8px">본문</div>
        <textarea id="postBody" class="form-input form-textarea" placeholder="글 본문 내용"></textarea>
      </div>
    </div>

    <!-- Comments -->
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin:0">댓글 설정</div>
        <span style="font-size:11px;color:var(--muted)">댓글 아이디별 내용 입력</span>
      </div>
      <div id="commentRows"></div>
      <button class="add-btn" onclick="addCommentRow()">+ 댓글 추가</button>
    </div>

    <!-- Replies -->
    <div class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-title" style="margin:0">대댓글 설정</div>
        <span style="font-size:11px;color:var(--muted)">메인 계정으로 작성</span>
      </div>
      <div id="replyRows"></div>
      <button class="add-btn" onclick="addReplyRow()">+ 대댓글 추가</button>
    </div>

    <!-- Delay Settings -->
    <div class="section" style="cursor:pointer" onclick="this.querySelector('.delay-body').style.display=this.querySelector('.delay-body').style.display==='none'?'block':'none'">
      <div class="section-title" style="margin:0">딜레이 설정 (클릭하여 펼치기)</div>
      <div class="delay-body" style="display:none;margin-top:12px" onclick="event.stopPropagation()">
        <div class="form-row">
          <div class="form-label">로그인 후</div>
          <input id="delayLogin" class="form-input" type="text" value="4~7" style="width:80px" placeholder="4~7">
          <span style="font-size:11px;color:var(--muted)">초</span>
        </div>
        <div class="form-row">
          <div class="form-label">계정 전환</div>
          <input id="delayBetween" class="form-input" type="text" value="8~15" style="width:80px" placeholder="8~15">
          <span style="font-size:11px;color:var(--muted)">초</span>
        </div>
        <div class="form-row">
          <div class="form-label">IP 변경</div>
          <input id="delayAirplane" class="form-input" type="text" value="10~18" style="width:80px" placeholder="10~18">
          <span style="font-size:11px;color:var(--muted)">초</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Log Panel -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-header-title">실행 로그</span>
      <button class="btn btn-outline btn-sm" onclick="clearLog()">지우기</button>
    </div>
    <div id="logBody" class="log-body">
      <div class="log-line"><span class="log-time">--:--:--</span><span class="log-msg" style="color:var(--muted)">작업을 시작하면 로그가 여기에 표시됩니다</span></div>
    </div>
    <div class="run-bar">
      <button id="btnRun" class="btn btn-primary" onclick="startTask()">▶ 작업 시작</button>
      <button id="btnStop" class="btn btn-danger" onclick="stopTask()" style="flex:0 0 100px" disabled>⏹ 중단</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let accounts = { main: null, commenters: [] };
let taskMode = 'new';
let eventSource = null;

// ── Init ──
async function init() {
  await loadAccounts();
  checkAdb();
  setInterval(checkAdb, 30000);
  connectSSE();
}

// ── SSE ──
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/logs/stream');
  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'log') addLog(data.time, data.message);
    else if (data.type === 'done') {
      addLog('--:--:--', data.result?.success ? '✅ 작업 완료!' : '❌ 작업 실패: ' + (data.result?.error || ''));
      document.getElementById('btnRun').disabled = false;
      document.getElementById('btnStop').disabled = true;
    } else if (data.type === 'error') {
      addLog('--:--:--', '❌ ' + data.message);
      document.getElementById('btnRun').disabled = false;
      document.getElementById('btnStop').disabled = true;
    }
  };
  eventSource.onerror = () => { setTimeout(connectSSE, 3000); };
}

// ── Accounts ──
async function loadAccounts() {
  const res = await fetch('/api/accounts');
  accounts = await res.json();
  renderAccounts();
}

function renderAccounts() {
  const el = document.getElementById('accountsList');
  let html = '';
  if (accounts.main) {
    html += `<div class="account-tag"><span class="role">메인</span>${accounts.main.id}<span class="del" onclick="removeAccount('main',0)">×</span></div>`;
  }
  accounts.commenters.forEach((c, i) => {
    html += `<div class="account-tag"><span class="role">댓글${i+1}</span>${c.id}<span class="del" onclick="removeAccount('commenter',${i})">×</span></div>`;
  });
  el.innerHTML = html || '<span style="font-size:12px;color:var(--muted)">등록된 계정이 없습니다</span>';
}

async function addAccount() {
  const id = document.getElementById('accId').value.trim();
  const pw = document.getElementById('accPw').value.trim();
  const role = document.getElementById('accRole').value;
  if (!id || !pw) return;

  if (role === 'main') {
    accounts.main = { id, pw, label: '메인 계정' };
  } else {
    accounts.commenters.push({ id, pw, label: `댓글 ${accounts.commenters.length + 1}` });
  }

  await fetch('/api/accounts', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(accounts) });
  document.getElementById('accId').value = '';
  document.getElementById('accPw').value = '';
  renderAccounts();
  updateCommentSelects();
}

async function removeAccount(type, idx) {
  if (type === 'main') accounts.main = null;
  else accounts.commenters.splice(idx, 1);
  await fetch('/api/accounts', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(accounts) });
  renderAccounts();
  updateCommentSelects();
}

// ── Mode ──
function setMode(mode) {
  taskMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b, i) => b.classList.toggle('active', (i===0&&mode==='new')||(i===1&&mode==='edit')));
  document.getElementById('editUrlRow').style.display = mode === 'edit' ? 'flex' : 'none';
}

// ── Comments ──
function getCommenterOptions() {
  return accounts.commenters.map(c => `<option value="${c.id}">${c.id}</option>`).join('');
}

function updateCommentSelects() {
  document.querySelectorAll('.comment-select').forEach(sel => {
    const val = sel.value;
    sel.innerHTML = getCommenterOptions();
    if (val) sel.value = val;
  });
}

function addCommentRow() {
  const container = document.getElementById('commentRows');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'comment-row';
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <select class="comment-select">${getCommenterOptions()}</select>
      <button class="btn btn-danger btn-sm" onclick="this.closest('.comment-row').remove()">삭제</button>
    </div>
    <textarea placeholder="댓글 내용 입력"></textarea>`;
  container.appendChild(div);
}

function addReplyRow() {
  const container = document.getElementById('replyRows');
  const commentCount = document.getElementById('commentRows').children.length;
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'reply-row';
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;color:var(--accent);font-weight:600">댓글 #<input type="number" class="reply-target" value="${idx+1}" min="1" style="width:40px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 4px;font-size:12px;text-align:center"> 에 대한 대댓글</span>
      <button class="btn btn-danger btn-sm" onclick="this.closest('.reply-row').remove()">삭제</button>
    </div>
    <textarea placeholder="대댓글 내용 입력 (메인 계정으로 작성됩니다)"></textarea>`;
  container.appendChild(div);
}

// ── ADB Status ──
async function checkAdb() {
  try {
    const res = await fetch('/api/adb/status');
    const data = await res.json();
    document.getElementById('adbDot').className = 'status-dot ' + (data.connected ? 'on' : 'off');
    document.getElementById('adbText').textContent = data.connected ? '연결됨' : '미연결';
    document.getElementById('currentIp').textContent = data.ip || '-';
  } catch(e) {
    document.getElementById('adbText').textContent = '오류';
  }
}

// ── Log ──
function addLog(time, msg) {
  const body = document.getElementById('logBody');
  const line = document.createElement('div');
  line.className = 'log-line' + (msg.includes('❌') ? ' error' : msg.includes('✅') ? ' success' : '');
  line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${escHtml(msg)}</span>`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Run Task ──
async function startTask() {
  // Gather data
  const comments = [];
  document.querySelectorAll('.comment-row').forEach(row => {
    const sel = row.querySelector('select');
    const txt = row.querySelector('textarea');
    if (sel && txt && txt.value.trim()) {
      comments.push({ account_id: sel.value, text: txt.value.trim() });
    }
  });

  const replies = [];
  document.querySelectorAll('.reply-row').forEach(row => {
    const target = row.querySelector('.reply-target');
    const txt = row.querySelector('textarea');
    if (target && txt && txt.value.trim()) {
      replies.push({ to_index: parseInt(target.value) - 1, text: txt.value.trim() });
    }
  });

  const task = {
    mode: taskMode,
    cafe_url: document.getElementById('cafeUrl').value.trim(),
    post_url: document.getElementById('postUrl').value.trim(),
    board_name: document.getElementById('boardName').value.trim(),
    title: document.getElementById('postTitle').value.trim(),
    body: document.getElementById('postBody').value.trim(),
    comments,
    replies,
  };

  if (!task.cafe_url && taskMode === 'new') { alert('카페 URL을 입력하세요'); return; }
  if (!task.post_url && taskMode === 'edit') { alert('수정할 글 URL을 입력하세요'); return; }

  document.getElementById('btnRun').disabled = true;
  document.getElementById('btnStop').disabled = false;
  addLog('--:--:--', '🚀 작업 시작...');

  try {
    const res = await fetch('/api/tasks/run', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(task)
    });
    const data = await res.json();
    if (!res.ok) {
      addLog('--:--:--', '❌ ' + (data.error || '시작 실패'));
      document.getElementById('btnRun').disabled = false;
      document.getElementById('btnStop').disabled = true;
    }
  } catch(e) {
    addLog('--:--:--', '❌ 요청 오류: ' + e.message);
    document.getElementById('btnRun').disabled = false;
    document.getElementById('btnStop').disabled = true;
  }
}

async function stopTask() {
  await fetch('/api/tasks/stop', { method: 'POST' });
  addLog('--:--:--', '⚠ 중단 요청됨...');
}

// Init
init();
</script>
</body>
</html>
